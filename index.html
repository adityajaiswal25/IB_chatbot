<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB Chatbot Fixed</title>

<style>
:root {
  --green:#2a7a3a;
  --green-light:#3da054;
  --bg:#f0f7f2;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  height:100dvh;
  font-family:sans-serif;
  overflow:hidden;
  background:var(--bg);
}

/* FULLSCREEN */
#chat-panel{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  height:100dvh;
  background:#fff;
}

/* HEADER */
.chat-header{
  background:var(--green);
  color:#fff;
  padding:15px;
  font-weight:bold;
}

/* MESSAGES */
#chat-messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg{
  margin-bottom:10px;
}

.user{text-align:right;}
.bot{text-align:left;}

.bubble{
  display:inline-block;
  padding:10px 14px;
  border-radius:14px;
  max-width:80%;
}

.user .bubble{
  background:var(--green);
  color:#fff;
}

.bot .bubble{
  background:#eee;
}

/* INPUT FIX */
.chat-input-area{
  position:sticky;
  bottom:0;
  background:#fff;
  padding:10px;
  border-top:1px solid #ddd;
}

.chat-input-row{
  display:flex;
  gap:10px;
}

#chat-input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

#send-btn{
  padding:10px 15px;
  border:none;
  background:var(--green);
  color:#fff;
  border-radius:10px;
}
</style>

</head>

<body>

<div id="chat-panel">

<div class="chat-header">ABIS AI Assistant</div>

<div id="chat-messages"></div>

<div class="chat-input-area">
  <div class="chat-input-row">
    <input id="chat-input" placeholder="Type message...">
    <button id="send-btn">Send</button>
  </div>
</div>

</div>

<script>
const input = document.getElementById("chat-input");
const btn = document.getElementById("send-btn");
const chat = document.getElementById("chat-messages");

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML="<div class='bubble'>"+text+"</div>";
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const val=input.value.trim();
  if(!val)return;

  addMsg(val,"user");
  input.value="";

  setTimeout(()=>{
    addMsg("Reply: "+val,"bot");
  },500);
}

btn.onclick=send;
input.onkeydown=(e)=>{
  if(e.key==="Enter") send();
};

addMsg("Namaste 🌾 IB bot ready","bot");
</script>

</body>
</html>
