<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Group Chatbot - Direct Mobile</title>
    <style>
        /* MOBILE FULLSCREEN CHATBOT - EXTRACTED & MODIFIED FROM ibgroup_clone.html */

        /* ─── CSS VARIABLES (essential) ─── */
        :root {
            --green: #2a7a3a;
            --green-dark: #1a5227;
            --green-light: #3da054;
            --green-glow: #4cbb6c;
            --gold: #c9a227;
            --cream: #f7f4ee;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #444;
            --text-light: #888;
            --chat-bg: #f0f7f2;
            --radius: 14px;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-sizing;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body), sans-serif;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            color: var(--text-dark);
            overflow: hidden;
            height: 100vh;
        }

        /* HIDE FAB - Direct Open */
        #chat-fab {
            display: none !important;
        }

        /* ── FULLSCREEN PANEL ── */
        #chat-panel {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            transform: none !important;
            opacity: 1 !important;
            pointer-events: all !important;
            background: #fff;
            box-shadow: none;
            display: flex !important;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header (top safe area) ── */
        .chat-header {
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .chat-header-status {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4cff85;
            animation: statusPulse 2s ease infinite;
        }

        .chat-header-actions {
            display: flex;
            gap: 10px;
        }

        .chat-header-actions button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .chat-header-actions button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Messages (flex:1 scrollable) ── */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            background: linear-gradient(to bottom, #f8fbf9 0%, var(--chat-bg) 100%);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(42, 122, 58, 0.3);
            border-radius: 2px;
        }

        .chat-date-sep {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            font-weight: 500;
            letter-spacing: 0.05em;
            margin: 20px 0;
        }

        .chat-date-sep::before,
        .chat-date-sep::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e4ede8;
        }

        /* Message bubbles - TOUCH FRIENDLY */
        .msg {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            animation: msgIn 0.4s ease-out both;
            max-width: 90%;
            padding: 0 4px;
        }

        .msg.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .msg.bot {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--green-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(42, 122, 58, 0.25);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.55;
            max-width: 100%;
            word-wrap: break-word;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .msg.bot .bubble {
            background: #fff;
            color: var(--text-dark);
            border-bottom-left-radius: 6px;
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, var(--green), var(--green-light));
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
            padding: 0 6px;
            flex-shrink: 0;
        }

        /* Typing */
        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 14px 18px;
            background: #fff;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-light);
            animation: typingBounce 1.4s ease infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Quick replies - MOBILE */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 8px 0 8px 48px;
            margin-bottom: 12px;
        }

        .qr-btn {
            background: #fff;
            color: var(--green-dark);
            border: 2px solid var(--green);
            border-radius: 25px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            touch-action: manipulation;
            min-height: 44px;
            /* iOS touch target */
        }

        .qr-btn:hover,
        .qr-btn:active {
            background: var(--green) !important;
            color: #fff !important;
            transform: translateY(-2px);
        }

        /* ── Input (bottom safe area) ── */
        .chat-input-area {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eef3f0;
            flex-shrink: 0;
        }

        .chat-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f8fbf9;
            border-radius: 20px;
            padding: 14px 18px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .chat-input-row:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(42, 122, 58, 0.1);
        }

        #chat-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            line-height: 1.5;
            padding: 4px 0;
        }

        #chat-input::placeholder {
            color: #9ca3af;
        }

        #send-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--green), var(--green-light));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(42, 122, 58, 0.3);
            min-height: 44px;
        }

        #send-btn:hover {
            transform: scale(1.05);
        }

        #send-btn:active {
            transform: scale(0.98);
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .chat-input-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .n8n-badge {
            font-size: 0.7rem;
            background: rgba(42, 122, 58, 0.1);
            color: var(--green);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-weight: 600;
        }

        /* KEYFRAMES */
        @keyframes statusPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* RESPONSIVE ENHANCEMENTS */
        @media (max-width: 480px) {
            .msg {
                max-width: 95%;
            }

            .bubble {
                padding: 16px 20px;
                font-size: 1.05rem;
            }

            .quick-replies {
                padding-left: 56px;
            }

            .qr-btn {
                padding: 12px 22px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- EXTRACTED & MODIFIED CHATBOT - AUTO-OPENS FULLSCREEN -->

    <div class="chatbot-wrapper">
        <!-- FAB HIDDEN BY CSS -->
        <button id="chat-fab" style="display:none;" aria-label="Chat (auto-open)">
            <div class="fab-notif" id="fab-notif" style="display:none;"></div>
            <svg class="fab-icon-chat" viewBox="0 0 24 24">
                <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z" />
            </svg>
            <svg class="fab-icon-close" viewBox="0 0 24 24">
                <path
                    d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
            </svg>
        </button>

        <!-- FULLSCREEN PANEL - AUTO OPEN -->
        <div id="chat-panel" role="dialog" aria-label="IB Group AI Assistant">

            <!-- Header -->
            <div class="chat-header">
                <div class="chat-avatar">🌾</div>
                <div class="chat-header-info">
                    <div class="chat-header-name">ABIS AI Assistant</div>
                    <div class="chat-header-status">
                        <span class="status-dot"></span>
                        Online · IB Group 
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button title="Refresh chat" onclick="clearChat()">↺</button>
                    <button title="Close" onclick="toggleChat()">✕</button>
                </div>
            </div>

            <!-- Messages -->
            <div id="chat-messages">
                <div class="chat-date-sep">Today</div>
            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <div class="chat-input-row">
                    <textarea id="chat-input" rows="1" placeholder="Ask about products, farming, feeds…"
                        aria-label="Type message"></textarea>
                    <button id="send-btn" aria-label="Send">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        /* ════════════════════════════════════════
           IB GROUP CHATBOT - MOBILE FULLSCREEN VERSION
           
           FEATURES PRESERVED FROM ORIGINAL:
           ✅ Demo responses (feeds, Parivartan, vaccination, contacts)
           ✅ Typing animation (3 dots)
           ✅ Quick replies + contextual follow-ups
           ✅ Auto-resize input, Enter-to-send
           ✅ Message formatting, timestamps, date separators
           ✅ n8n webhook integration ready
           
           MODIFICATIONS:
           - Auto-opens full-screen (no FAB press)
           - Mobile-optimized touch targets
           - Viewport meta for smartphone
        ════════════════════════════════════════ */

        const panel = document.getElementById('chat-panel');
        const messagesEl = document.getElementById('chat-messages');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        /* n8n WEBHOOK - USER TO CONFIGURE */
        const N8N_WEBHOOK_URL = 'https://n8n.srv965596.hstgr.cloud/webhook-test/67fce2a7-32dd-41a2-80c9-c77ca366e73c';  // Paste here!

        const SESSION_ID = 'ibg-mobile-' + Math.random().toString(36).slice(2, 10);
        let isBotTyping = false;

        /* QUICK REPLIES */
        const QUICK_REPLIES = [
            'What feeds are available?',
            'Tell me about Parivartan',
            'Broiler nutrition guide',
            'Contact details'
        ];

        /* ── AUTO-OPEN ON LOAD ── */
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // Force open fullscreen
                panel.style.display = 'flex';
                panel.classList.add('open');
                inputEl.focus();
            }, 200);
        });

        /* ── Send message ── */
        async function sendMessage(text) {
            const trimmed = (text || inputEl.value).trim();
            if (!trimmed || isBotTyping) return;

            inputEl.value = '';
            autoResize();
            appendUserMessage(trimmed);
            clearQuickReplies();

            isBotTyping = true;
            showTyping();

            try {
                if (N8N_WEBHOOK_URL && N8N_WEBHOOK_URL !== 'YOUR_N8N_WEBHOOK_URL_HERE') {
                    const res = await fetch(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: trimmed, sessionId: SESSION_ID }),
                    });
                    const data = await res.json();
                    hideTyping();
                    appendBotMessage(data.response || 'Thanks for your message!');
                } else {
                    // DEMO RESPONSES (original website functionality)
                    await sleep(1500);
                    hideTyping();
                    appendBotMessage(getDemoResponse(trimmed));
                }
            } catch {
                hideTyping();
                appendBotMessage('Network error. Try: poultry@ibgroup.co.in | 7610233333');
            }

            isBotTyping = false;
        }

        /* ── All original demo responses preserved ── */
        function getDemoResponse(q) {
            const ql = q.toLowerCase();

            if (ql.includes('feed') || ql.includes('broiler') || ql.includes('nutrition')) {
                return `**Broiler Feed Guide** 🐔\n\n**Pre-Starter (0-14d):** 2950kcal | 22.5% Prot\n**Starter (15-26d):** 3050kcal | 20.5% Prot\n**Finisher (27d+):** 3150kcal | 19% Prot\n\nABIS Gold series available!`;
            }

            if (ql.includes('parivartan') || ql.includes('ec house')) {
                return `**Parivartan EC House** 🏠\n✅ 2x farmer income\n✅ 25% financial support\n✅ 24/7 technical help\n\n📞 7610255555`;
            }

            if (ql.includes('layer') || ql.includes('egg')) {
                return `**Layer Feed** 🥚\n**Laying Phase:** 16.5% Prot | **4.1% Calcium**\n\nCritical for strong eggshells!`;
            }

            if (ql.includes('contact') || ql.includes('phone')) {
                return `**📞 Contacts**\n🐔 Poultry: 7610233333\n🏠 Parivartan: 7610255555\n✉️ mail@ibgroup.co.in`;
            }

            return `Namaste! 🌾 Ask about feeds, Parivartan EC House, vaccination, or contacts!`;
        }

        /* ── UI Functions (all original preserved) ── */
        function appendBotMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'msg bot';
            msg.innerHTML = `
    <div class="msg-avatar">🌾</div>
    <div>
      <div class="bubble">${formatText(text)}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
            messagesEl.appendChild(msg);
            scrollBottom();
        }

        function appendUserMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'msg user';
            msg.innerHTML = `
    <div>
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
            messagesEl.appendChild(msg);
            scrollBottom();
        }

        function showTyping() {
            const el = document.createElement('div');
            el.id = 'typing-msg';
            el.className = 'msg bot';
            el.innerHTML = `
    <div class="msg-avatar">🌾</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>`;
            messagesEl.appendChild(el);
            scrollBottom();
        }

        function hideTyping() {
            const el = document.getElementById('typing-msg');
            if (el) el.remove();
        }

        function showQuickReplies(items) {
            const row = document.createElement('div');
            row.id = 'quick-replies-row';
            row.className = 'quick-replies';
            items.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'qr-btn';
                btn.textContent = q;
                btn.onclick = () => { clearQuickReplies(); sendMessage(q); };
                row.appendChild(btn);
            });
            messagesEl.appendChild(row);
            scrollBottom();
        }

        function clearQuickReplies() {
            const qr = document.getElementById('quick-replies-row');
            if (qr) qr.remove();
        }

        function clearChat() {
            messagesEl.innerHTML = '<div class="chat-date-sep">Today</div>';
            init();
        }

        function toggleChat() {
            // Optional: close button still works
            panel.style.display = 'none';
        }

        /* ── Utils ── */
        function formatText(t) {
            return escapeHtml(t)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(t) {
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }

        function getTime() {
            return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function scrollBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function autoResize() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        }

        /* ── Event listeners ── */
        inputEl.oninput = autoResize;
        inputEl.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        sendBtn.onclick = () => sendMessage();

        /* ── INIT with welcome ── */
        function init() {
            const welcome = `Namaste! 🌾 ABIS AI ready!\n\nI know IB Group:\n• **Feeds** (broiler/layer/Gavran/fish)\n• **Parivartan EC House**\n• **Vaccination** (in-ovo pioneer)\n• **Contacts**\n `;
            appendBotMessage(welcome);
            setTimeout(() => showQuickReplies(QUICK_REPLIES), 800);
        }

        init();
    </script>

</body>

</html>
